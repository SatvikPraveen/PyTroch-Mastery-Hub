[tox]
envlist = py38, py39, py310, py311, lint, docs
skipsdist = False
isolated_build = True

[testenv]
deps =
    pytest>=6.2.0
    pytest-cov>=2.12.0
    pytest-xdist>=2.5.0
    torch>=2.0.0
    torchvision>=0.15.0
commands =
    pytest tests/ -v -x --cov=src --cov-report=term-missing {posargs}
extras = dev

[testenv:lint]
deps =
    black>=21.0.0
    flake8>=3.9.0
    isort>=5.9.0
    bandit>=1.7.0
    mypy>=0.910
    types-PyYAML
    types-requests
commands =
    black --check src tests
    isort --check-only src tests
    flake8 src tests
    bandit -r src -x tests
    mypy src --ignore-missing-imports
skip_install = True

[testenv:format]
deps =
    black>=21.0.0
    isort>=5.9.0
commands =
    black src tests
    isort src tests
skip_install = True

[testenv:docs]
deps =
    sphinx>=4.0.0
    sphinx-rtd-theme>=1.0.0
    nbsphinx>=0.8.0
    sphinx-autodoc-typehints>=1.12.0
    myst-parser>=0.18.0
commands =
    sphinx-build -b html docs/ docs/_build/html
extras = docs

[testenv:security]
deps =
    bandit>=1.7.0
    safety>=1.10.0
commands =
    bandit -r src -f custom -o bandit-report.json
    safety check
skip_install = True

[testenv:coverage]
deps =
    pytest>=6.2.0
    pytest-cov>=2.12.0
    coverage[toml]>=6.0.0
    torch>=2.0.0
    torchvision>=0.15.0
commands =
    pytest tests/ --cov=src --cov-report=html --cov-report=xml --cov-report=term-missing
    coverage report --fail-under=70
extras = dev

# Configuration for flake8 in tox
[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude =
    .tox,
    build,
    dist,
    venv,
    .venv,
    notebooks
